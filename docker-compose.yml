version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fileproc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: file_proc_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "23306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fileproc-redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fileproc-backend
    restart: unless-stopped
    ports:
      - "28080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: file_proc_db
      DB_USER: root
      DB_PASS: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS:
      FILE_UPLOAD_DIR: /app/uploads
      SPRING_PROFILES_ACTIVE: prod
      ONLYOFFICE_SERVER_URL: http://onlyoffice:80
      ONLYOFFICE_CALLBACK_URL: http://backend:8080/api/onlyoffice/callback
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # OnlyOffice Document Server - 在线文档编辑服务
  onlyoffice:
    image: onlyoffice/documentserver:8.0
    container_name: fileproc-onlyoffice
    restart: unless-stopped
    ports:
      - "29090:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    environment:
      - JWT_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  upload_data:
  onlyoffice_data:
  onlyoffice_logs:
