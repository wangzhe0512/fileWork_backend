server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: file-processing-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:file_proc_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:root123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fileproc.**.entity

# JWT 配置
jwt:
  user:
    secret: ${JWT_USER_SECRET:fileproc_user_secret_key_2024_must_be_long_enough}
    expire: 86400  # 24小时（秒）
  admin:
    secret: ${JWT_ADMIN_SECRET:fileproc_admin_secret_key_2024_must_be_long_enough}
    expire: 28800  # 8小时（秒）

# 文件存储
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  access-path: /files/**

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# CORS 跨域白名单（逗号分隔多域名，生产环境在 application-prod.yml 中覆盖）
cors:
  allowed-origins: http://localhost:5173
