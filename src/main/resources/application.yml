server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: file-processing-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:file_proc_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:root123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    validate-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fileproc.**.entity

# JWT 配置
jwt:
  user:
    secret: ${JWT_USER_SECRET:fileproc_user_secret_key_2024_must_be_long_enough}
    expire: 86400  # 24小时（秒）
  admin:
    secret: ${JWT_ADMIN_SECRET:fileproc_admin_secret_key_2024_must_be_long_enough}
    expire: 28800  # 8小时（秒）

# 文件存储
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  access-path: /files/**

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# CORS 跨域白名单（逗号分隔多域名，生产环境在 application-prod.yml 中覆盖）
cors:
  allowed-origins: http://localhost:5173

# 反向生成引擎配置
# Sheet类型识别为全自动（按内容识别），无需手动配置白名单
reverse-engine: {}

# 大模型（Ollama）配置
# 生产环境可通过环境变量覆盖：LLM_OLLAMA_BASE_URL、LLM_OLLAMA_MODEL 等
llm:
  ollama:
    # Ollama 服务地址（本机部署默认11434端口）
    base-url: ${LLM_OLLAMA_BASE_URL:http://localhost:11434}
    # 推荐使用 qwen3:8b（8核16G服务器可运行），备选 qwen2.5:7b
    model: ${LLM_OLLAMA_MODEL:qwen3:8b}
    # 是否启用大模型引擎；false 时直接使用旧字符串匹配引擎
    enabled: ${LLM_OLLAMA_ENABLED:true}
    # 单次推理超时（秒），CPU推理较慢，建议180~300秒
    timeout-seconds: ${LLM_OLLAMA_TIMEOUT:180}
    # 健康检查超时（秒）
    health-check-timeout-seconds: ${LLM_OLLAMA_HEALTH_TIMEOUT:3}
    # 置信度阈值：>= 此值为高置信度自动确认，< 此值标记低置信度提示
    confidence-threshold: ${LLM_OLLAMA_CONFIDENCE_THRESHOLD:0.8}
    # Word 段落片段最大字符数（超过则强制截断，控制 Prompt 长度）
    max-segment-chars: ${LLM_OLLAMA_MAX_SEGMENT_CHARS:1500}
